<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 960" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1840" height="960" fill="#f8fafc"/>

  <!-- title -->
  <text x="44" y="56" font-size="30" font-weight="700" fill="#0f172a">Logots V1 — System Architecture</text>
  <text x="46" y="86" font-size="15" fill="#64748b">Sensory Input → Staging → Transformation → Mart → Decision → Execution → back to hardware</text>

  <!-- cadence chip -->
  <rect x="1430" y="36" width="370" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="1615" y="61" font-size="13" fill="#334155" text-anchor="middle">FPS 4  ·  chunk 12 frames (~3 s)  ·  reflective ~20 s</text>

  <!-- ============ LAYER BANDS ============ -->
  <!-- 1 Sensory -->
  <rect x="40"   y="150" width="200" height="620" rx="22" fill="#eef2f7" stroke="#94a3b8"/>
  <rect x="60"   y="168" width="160" height="38" rx="19" fill="#64748b"/>
  <text x="140"  y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">1 · Sensory Input</text>
  <!-- 2 Staging -->
  <rect x="310"  y="150" width="200" height="620" rx="22" fill="#e8f1fd" stroke="#7aa0d2"/>
  <rect x="330"  y="168" width="160" height="38" rx="19" fill="#3b82f6"/>
  <text x="410"  y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">2 · Staging</text>
  <!-- 3 Transformation -->
  <rect x="580"  y="150" width="280" height="620" rx="22" fill="#e9f7e7" stroke="#86bf6a"/>
  <rect x="600"  y="168" width="240" height="38" rx="19" fill="#22a558"/>
  <text x="720"  y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3 · Transformation</text>
  <!-- 4 Mart -->
  <rect x="930"  y="150" width="200" height="620" rx="22" fill="#fdf4e3" stroke="#e0b15f"/>
  <rect x="950"  y="168" width="160" height="38" rx="19" fill="#f59e0b"/>
  <text x="1030" y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">4 · Mart</text>
  <!-- 5 Decision -->
  <rect x="1200" y="150" width="290" height="620" rx="22" fill="#f1ebfb" stroke="#a78bd0"/>
  <rect x="1220" y="168" width="250" height="38" rx="19" fill="#8b5cf6"/>
  <text x="1345" y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">5 · Decision</text>
  <!-- 6 Execution -->
  <rect x="1560" y="150" width="200" height="620" rx="22" fill="#fde9e9" stroke="#d98989"/>
  <rect x="1580" y="168" width="160" height="38" rx="19" fill="#ef4444"/>
  <text x="1660" y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">6 · Execution</text>

  <!-- ============ FLOW ARROWS BETWEEN BANDS ============ -->
  <g stroke="#475569" stroke-width="2.5" fill="none">
    <line x1="246" y1="460" x2="302" y2="460" marker-end="url(#arrow)"/>
    <line x1="516" y1="460" x2="572" y2="460" marker-end="url(#arrow)"/>
    <line x1="866" y1="460" x2="922" y2="460" marker-end="url(#arrow)"/>
    <line x1="1136" y1="460" x2="1192" y2="460" marker-end="url(#arrow)"/>
    <line x1="1496" y1="460" x2="1552" y2="460" marker-end="url(#arrow)"/>
  </g>
  <g font-size="11" fill="#64748b" text-anchor="middle" font-style="italic">
    <text x="274" y="450">stream</text>
    <text x="544" y="450">extract</text>
    <text x="894" y="450">join</text>
    <text x="1164" y="450">decide</text>
    <text x="1524" y="450">to PWM</text>
  </g>

