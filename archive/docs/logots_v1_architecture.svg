  <text x="80" y="386" font-size="11" fill="#64748b">I²S mic · 16 kHz mono</text>
  <text x="80" y="402" font-size="10" fill="#94a3b8">TCP 12345</text>

  <g filter="url(#shadow)"><rect x="56" y="432" width="168" height="86" rx="12" fill="#ffffff" stroke="#e2e8f0"/></g>
