  <!-- ============ CLOSED LOOP (Execution → Hardware) ============ -->
  <path d="M 1660 770 L 1660 868 Q 1660 888 1640 888 L 160 888 Q 140 888 140 868 L 140 774"
        fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowLoop)"/>
