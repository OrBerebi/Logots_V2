  <text x="80" y="466" font-size="14" font-weight="700" fill="#0f172a">ESP32 + 9DOF</text>
  <text x="80" y="488" font-size="11" fill="#64748b">Grove IMU · yaw/pitch/roll</text>
  <text x="80" y="504" font-size="10" fill="#94a3b8">TCP 12345</text>

  <g filter="url(#shadow)"><rect x="56" y="534" width="168" height="86" rx="12" fill="#ffffff" stroke="#e2e8f0"/></g>
  <rect x="64" y="550" width="4" height="54" rx="2" fill="#64748b"/>
  <text x="80" y="568" font-size="14" font-weight="700" fill="#0f172a">ESP32 → Arduino</text>
