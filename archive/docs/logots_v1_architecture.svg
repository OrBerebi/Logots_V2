  <text x="920" y="893" font-size="12" font-weight="600" fill="#0369a1" text-anchor="middle">closing the loop · BRAIN_COMMAND_QUEUE → stream_motors → motor ESP32 (PWM @ 4 fps)</text>

  <!-- footer note -->
  <text x="46" y="936" font-size="11" fill="#94a3b8">Manual GUI control overrides the brain at all times · debug mode adds audio/video/GIF capture · normal mode streams CSVs with bounded RAM</text>
