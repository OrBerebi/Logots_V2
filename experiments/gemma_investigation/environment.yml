# Dedicated env for the Gemma investigation, kept separate from the robot's
# `logots` env and from anaconda `base`. The key reason it exists: Gemma 4 needs
# a newer `transformers` than what's currently installed (4.57 ships Gemma 3n/3
# but not Gemma 4).
#
#   conda env create -f environment.yml
#   conda activate gemma-lab
#   huggingface-cli login          # accept the Gemma license first (see README)
#   python -m ipykernel install --user --name gemma-lab
#
# Apple Silicon (M1 Max): torch uses the MPS backend automatically.
name: gemma-lab
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # Gemma 4 requires the latest transformers. If `Gemma4ForConditionalGeneration`
      # is still missing after install, use the bleeding edge:
      #   pip install -U git+https://github.com/huggingface/transformers
      - transformers>=4.58
      - accelerate
      - torch
      - torchaudio
      - torchvision     # Gemma 4's image processor imports torchvision.transforms.v2
      - huggingface_hub
      - pillow          # Gemma 4's multimodal processor requires PIL
      - soundfile
      - librosa
      - pandas
      - jupyter
      - ipykernel
      - ipython
